name: terraform-apply

# Runs on push to main (i.e. after a PR merges). Assumes the scoped APPLY role
# via OIDC, applies, then invalidates the CloudFront cache so site edits go live.
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: tf-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_VAR_ip_hash_secret: ${{ secrets.IP_HASH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials (OIDC, apply role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.15.2"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
